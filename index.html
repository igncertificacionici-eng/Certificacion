<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificación IGN - Evidencias</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="container py-4">

  <h2 class="mb-4">Registro de Evidencias Geodésicas</h2>

  <!-- Campo para código del punto -->
  <div class="mb-3">
    <label for="codigo" class="form-label">Código del Punto</label>
    <input type="text" id="codigo" class="form-control" placeholder="Ej: PNT-001" required>
  </div>

  <!-- Selector de tipo de evidencia -->
  <div class="mb-3">
    <label for="tipo" class="form-label">Tipo de Evidencia</label>
    <select id="tipo" class="form-select">
      <option value="monumentacion">Proceso de monumentación</option>
      <option value="profundidad">Profundidad</option>
      <option value="anclaje">Anclaje de disco de bronce</option>
      <option value="incrustacion">Incrustación del disco</option>
      <option value="instalado">Disco instalado</option>
      <option value="altura">Medición de altura de antena</option>
      <option value="panoramicas">Fotografías panorámicas</option>
      <option value="video">Video</option>
    </select>
  </div>

  <!-- Input para abrir cámara -->
  <div class="mb-3">
    <label class="form-label">Capturar Evidencia</label>
    <input type="file" id="archivo" class="form-control" accept="image/*,video/*" capture="environment">
  </div>

  <button id="btnEnviar" class="btn btn-primary">Subir Evidencia</button>

  <script src="js/app.js"></script>
</body>
</html>
